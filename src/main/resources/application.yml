spring:
  application:
    name: ods-orchestrator-service
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: ods-orchestrator-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

orchestration:
  topics:
    order-event: topic-order-event
    order-command: topic-order-command
    product-event: topic-inventory-event
    product-command: topic-inventory-command
    payment-event: topic-payment-event
    payment-command: topic-payment-command

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
      # Groups are defined manually instead of using management.health.probes.enabled=true
      # because the probes.enabled auto-created groups ignore custom HealthIndicator beans (e.g. KafkaHealthIndicator)
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,kafka
  health:
    kafka:
      # Must be lower than Kubernetes probe timeoutSeconds to avoid false negatives
      timeout-ms: 1000

