receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  # Drop all spans for /actuator/** — healthcheck polling creates noise in Jaeger
  filter/drop_actuator:
    error_mode: ignore
    traces:
      span:
        - 'IsMatch(attributes["url.path"], "/actuator/.*")'
  batch:
    timeout: 1s
    send_batch_size: 1024

exporters:
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  # Prints span names to collector logs — useful for local debugging
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [filter/drop_actuator, batch]
      exporters: [otlp/jaeger, debug]